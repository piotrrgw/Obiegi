<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moduł 1: Kreator Bazy Taboru v1.2</title>
    
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
    <style>
        /* Wersja aplikacji: v1.2
           Autorzy: Gemini & Piotr M 🚂
           Opis: Dodano swobodne pozycjonowanie lokomotyw w składach wagonowych.
        */

        :root {
            --primary: #004d40;
            --secondary: #e0f2f1;
            --accent: #ff6f00;
            --text: #212121;
            --bg: #f5f7fa;
            --border: #b0bec5;
            --focus: #ff9100;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        header {
            border-bottom: 3px solid var(--primary);
            margin-bottom: 25px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 { color: var(--primary); margin: 0; font-size: 1.6rem; }
        
        .io-controls { display: flex; gap: 10px; flex-wrap: wrap; }

        .form-section {
            background: var(--secondary);
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 25px;
            border: 1px solid var(--primary);
        }

        .form-section h3 { margin-top: 0; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }

        label { font-weight: bold; margin-bottom: 6px; font-size: 0.9rem; }

        input[type="text"], input[type="time"], input[type="date"], select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
        }

        input:focus, select:focus, button:focus { outline: 3px solid var(--focus); outline-offset: 1px; }

        /* Przyciski */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: opacity 0.2s, background-color 0.2s;
        }

        .btn:hover { opacity: 0.9; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-accent { background-color: var(--accent); color: white; }
        .btn-danger { background-color: #d32f2f; color: white; padding: 6px 12px; font-size: 0.85rem; }
        .btn-small { padding: 6px 12px; font-size: 0.85rem; }
        .btn-loco { background-color: #ff8f00; color: white; }
        .btn-loco:hover { background-color: #e65100; }

        /* Daty kalendarz (Tagi) */
        .date-input-group { display: flex; gap: 10px; }
        .date-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; min-height: 30px; }
        .date-tag {
            background-color: var(--primary); color: white;
            padding: 4px 10px; border-radius: 15px; font-size: 0.85rem;
            display: flex; align-items: center; gap: 6px;
        }
        .date-tag.exclude { background-color: #d32f2f; }
        .date-tag button {
            background: none; border: none; color: white; font-weight: bold;
            cursor: pointer; padding: 0 2px; font-size: 1rem; line-height: 1;
        }

        /* Checkboxy dni */
        .days-checkboxes { display: flex; flex-wrap: wrap; gap: 12px; padding: 5px 0; }
        .day-check { display: flex; align-items: center; font-size: 0.9rem; cursor: pointer; }
        .day-check input { margin-right: 6px; width: 18px; height: 18px; }

        /* Wizualizator Zestawień */
        .consist-controls { display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .wagon-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; margin-bottom: 10px; }
        
        .visualizer-area {
            background: white; padding: 20px; border: 2px dashed var(--border);
            border-radius: 6px; margin-top: 15px; min-height: 80px;
            display: flex; align-items: center; gap: 4px; overflow-x: auto;
        }

        .train-unit {
            display: flex; align-items: center; justify-content: center;
            height: 40px; min-width: 50px; border: 2px solid #333;
            border-radius: 4px; font-weight: bold; font-size: 0.85rem; padding: 0 10px;
            background: #eee; position: relative;
        }
        .train-unit::after {
            content: ''; position: absolute; right: -6px; top: 18px;
            width: 4px; height: 4px; background: #333;
        }
        .train-unit:last-child::after { display: none; }
        
        .loco { background-color: #ffca28; border-color: #ff8f00; }
        .wagon-a { background-color: #ef9a9a; }
        .wagon-b { background-color: #90caf9; }
        .wagon-ab { background-color: #ce93d8; }
        .wagon-wr { background-color: #ffcc80; }
        .ezt { background-color: #80cbc4; border-color: #00695c; }

        /* Tabela */
        .table-responsive { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: #eee; color: var(--primary); }
        tr:hover { background-color: #f9f9f9; }
        
        .type-badge {
            display: inline-block; padding: 3px 8px; border-radius: 4px;
            font-size: 0.8rem; font-weight: bold; color: white;
        }
        .bg-arr { background-color: #2e7d32; }
        .bg-dep { background-color: #c62828; }

        footer {
            margin-top: 30px; padding-top: 15px; border-top: 1px solid #ddd;
            text-align: center; font-size: 0.9rem; color: #555;
        }

        @media (max-width: 600px) {
            .train-unit { min-width: 40px; font-size: 0.75rem; padding: 0 5px; }
            th, td { padding: 8px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <div class="container">
        <header>
            <h1>🛤️ Kreator Bazy Taboru v1.2</h1>
            <div class="io-controls">
                <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="loadDatabase(this)" aria-label="Wczytaj plik bazy JSON">
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📂 Wczytaj JSON</button>
                <button class="btn btn-accent" onclick="downloadDatabase()">💾 Pobierz JSON</button>
            </div>
        </header>

        <main>
            <form id="trainForm" onsubmit="addTrain(event)">
                <section class="form-section" aria-labelledby="basic-data-heading">
                    <h3 id="basic-data-heading">Dane Podstawowe</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="trainNumber">Numer Pociągu:</label>
                            <input type="text" id="trainNumber" placeholder="np. IC 12345" required>
                        </div>
                        <div class="form-group">
                            <label for="trainType">Typ Operacji:</label>
                            <select id="trainType" required>
                                <option value="przyjazd">Przyjazd (Wjazd na stację)</option>
                                <option value="odjazd">Odjazd (Wyjazd ze stacji)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="trainTime">Godzina:</label>
                            <input type="time" id="trainTime" required>
                        </div>
                        <div class="form-group">
                            <label for="trainRoute">Relacja:</label>
                            <input type="text" id="trainRoute" placeholder="np. Warszawa - Gdynia" required>
                        </div>
                    </div>
                </section>

                <section class="form-section" aria-labelledby="consist-heading">
                    <h3 id="consist-heading">Zestawienie Składu</h3>
                    
                    <div class="consist-controls" role="group" aria-label="Wybór typu składu">
                        <label class="day-check"><input type="radio" name="consistType" value="ezt" checked onchange="toggleConsistUI()"> Skład Zespolony</label>
                        <label class="day-check"><input type="radio" name="consistType" value="wagon" onchange="toggleConsistUI()"> Skład Wagonowy</label>
                    </div>

                    <div id="uiEZT" class="form-group">
                        <label for="eztSelect">Wybierz typ pojazdu:</label>
                        <select id="eztSelect" onchange="updateVisualizer()">
                            <option value="ED160">ED160 FLIRT (8 członów)</option>
                            <option value="ED161">ED161 DART (8 członów)</option>
                            <option value="ED250">ED250 Pendolino (7 członów)</option>
                        </select>
                    </div>

                    <div id="uiWagon" style="display:none;">
                        <label>Konstrukcja składu (klikaj w odpowiedniej kolejności):</label>
                        
                        <div style="margin-top: 10px;">
                            <strong style="font-size: 0.85rem; color: #555;">LOKOMOTYWY:</strong>
                            <div class="wagon-buttons">
                                <button type="button" class="btn btn-loco btn-small" onclick="addUnit('EP07', 'loco')">+ EP07</button>
                                <button type="button" class="btn btn-loco btn-small" onclick="addUnit('EP08', 'loco')">+ EP08</button>
                                <button type="button" class="btn btn-loco btn-small" onclick="addUnit('EP09', 'loco')">+ EP09</button>
                                <button type="button" class="btn btn-loco btn-small" onclick="addUnit('EU160', 'loco')">+ EU160</button>
                                <button type="button" class="btn btn-loco btn-small" onclick="addUnit('EU200', 'loco')">+ EU200</button>
                            </div>
                        </div>

                        <div>
                            <strong style="font-size: 0.85rem; color: #555;">WAGONY:</strong>
                            <div class="wagon-buttons">
                                <button type="button" class="btn btn-primary btn-small" onclick="addUnit('A', 'wagon')">+ Kl 1 (A)</button>
                                <button type="button" class="btn btn-primary btn-small" onclick="addUnit('AB', 'wagon')">+ Kl 1/2 (AB)</button>
                                <button type="button" class="btn btn-primary btn-small" onclick="addUnit('B', 'wagon')">+ Kl 2 (B)</button>
                                <button type="button" class="btn btn-primary btn-small" onclick="addUnit('WR', 'wagon')">+ Wars (WR)</button>
                                <button type="button" class="btn btn-primary btn-small" onclick="addUnit('BR', 'wagon')">+ Bar (BR)</button>
                                
                                <button type="button" class="btn btn-danger btn-small" onclick="removeLastUnit()" style="margin-left:auto;">Odczep ostatni pojazd</button>
                            </div>
                        </div>
                    </div>

                    <div id="visualizerArea" class="visualizer-area" aria-label="Podgląd wizualny zestawienia pociągu">
                        </div>
                </section>

                <section class="form-section" aria-labelledby="schedule-heading">
                    <h3 id="schedule-heading">Kalendarz Kursowania</h3>
                    
                    <div class="form-group full-width">
                        <label>Standardowe dni tygodnia:</label>
                        <div class="days-checkboxes">
                            <label class="day-check"><input type="checkbox" name="day" value="1"> Pon</label>
                            <label class="day-check"><input type="checkbox" name="day" value="2"> Wt</label>
                            <label class="day-check"><input type="checkbox" name="day" value="3"> Śr</label>
                            <label class="day-check"><input type="checkbox" name="day" value="4"> Czw</label>
                            <label class="day-check"><input type="checkbox" name="day" value="5"> Pt</label>
                            <label class="day-check"><input type="checkbox" name="day" value="6"> Sob</label>
                            <label class="day-check"><input type="checkbox" name="day" value="0"> Nd</label>
                        </div>
                    </div>

                    <div class="form-grid" style="margin-top: 15px;">
                        <div class="form-group">
                            <label for="incDate">Dodatkowe daty (jedzie specjalnie):</label>
                            <div class="date-input-group">
                                <input type="date" id="incDate">
                                <button type="button" class="btn btn-primary btn-small" onclick="addSpecificDate('inc')">Dodaj</button>
                            </div>
                            <div id="incDatesList" class="date-tags"></div>
                        </div>

                        <div class="form-group">
                            <label for="excDate">Daty wyłączone (nie jedzie w ogóle):</label>
                            <div class="date-input-group">
                                <input type="date" id="excDate">
                                <button type="button" class="btn btn-primary btn-small" onclick="addSpecificDate('exc')">Dodaj</button>
                            </div>
                            <div id="excDatesList" class="date-tags"></div>
                        </div>
                    </div>
                </section>

                <button type="submit" class="btn btn-accent" style="width: 100%; font-size: 1.1rem; padding: 15px;">➕ Dodaj Skład do Bazy</button>
            </form>

            <section aria-labelledby="list-heading">
                <h2 id="list-heading" style="margin-top: 30px; color: var(--primary);">Aktualna baza (<span id="countDisplay">0</span>)</h2>
                <div class="table-responsive">
                    <table id="databaseTable" aria-label="Lista zapisanych pociągów">
                        <thead>
                            <tr>
                                <th>Typ</th>
                                <th>Godzina</th>
                                <th>Nr / Relacja</th>
                                <th>Zestawienie</th>
                                <th>Kursowanie</th>
                                <th>Akcje</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>Współautorzy: Gemini & Piotr M 🚂 | Wersja aplikacji: v1.2</p>
        </footer>
    </div>

    <script>
        /* LOGIKA APLIKACJI - Moduł 1 v1.2 */
        
        let trainDatabase = [];
        let includedDates = [];
        let excludedDates = [];
        let currentConsist = []; // Zamiast currentWagons. Przechowuje obiekty {id: 'EP07', type: 'loco'}

        // --- OBSŁUGA ZESTAWIENIA I WIZUALIZACJI ---
        
        function toggleConsistUI() {
            const isEzt = document.querySelector('input[name="consistType"]:checked').value === 'ezt';
            document.getElementById('uiEZT').style.display = isEzt ? 'block' : 'none';
            document.getElementById('uiWagon').style.display = isEzt ? 'none' : 'block';
            updateVisualizer();
        }

        function addUnit(id, type) {
            currentConsist.push({ id, type });
            updateVisualizer();
        }

        function removeLastUnit() {
            if(currentConsist.length > 0) {
                currentConsist.pop();
                updateVisualizer();
            }
        }

        function updateVisualizer() {
            const area = document.getElementById('visualizerArea');
            area.innerHTML = '';
            const isEzt = document.querySelector('input[name="consistType"]:checked').value === 'ezt';

            if (isEzt) {
                const type = document.getElementById('eztSelect').value;
                const parts = (type === 'ED250') ? 7 : 8;
                for(let i=1; i<=parts; i++) {
                    area.innerHTML += `<div class="train-unit ezt" aria-hidden="true">${type} #${i}</div>`;
                }
            } else {
                currentConsist.forEach((unit) => {
                    if (unit.type === 'loco') {
                        area.innerHTML += `<div class="train-unit loco" aria-hidden="true">${unit.id}</div>`;
                    } else {
                        let wagonClass = 'wagon-b';
                        if(unit.id === 'A') wagonClass = 'wagon-a';
                        else if(unit.id === 'AB') wagonClass = 'wagon-ab';
                        else if(unit.id === 'WR') wagonClass = 'wagon-wr';
                        
                        area.innerHTML += `<div class="train-unit ${wagonClass}" aria-hidden="true">${unit.id}</div>`;
                    }
                });
            }
        }

        // --- OBSŁUGA DAT (KALENDARZ) ---

        function addSpecificDate(type) {
            const inputId = type === 'inc' ? 'incDate' : 'excDate';
            const dateVal = document.getElementById(inputId).value;
            
            if(!dateVal) return;

            if(type === 'inc' && !includedDates.includes(dateVal)) {
                includedDates.push(dateVal);
                renderDateTags('inc');
            } else if (type === 'exc' && !excludedDates.includes(dateVal)) {
                excludedDates.push(dateVal);
                renderDateTags('exc');
            }
            document.getElementById(inputId).value = ''; // czyszczenie inputu
        }

        function removeDate(type, dateStr) {
            if(type === 'inc') {
                includedDates = includedDates.filter(d => d !== dateStr);
                renderDateTags('inc');
            } else {
                excludedDates = excludedDates.filter(d => d !== dateStr);
                renderDateTags('exc');
            }
        }

        function renderDateTags(type) {
            const containerId = type === 'inc' ? 'incDatesList' : 'excDatesList';
            const arr = type === 'inc' ? includedDates : excludedDates;
            const cssClass = type === 'exc' ? 'exclude' : '';
            
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            arr.sort().forEach(dateStr => {
                container.innerHTML += `
                    <div class="date-tag ${cssClass}">
                        ${dateStr} <button type="button" onclick="removeDate('${type}', '${dateStr}')" aria-label="Usuń datę ${dateStr}">×</button>
                    </div>
                `;
            });
        }

        // --- GŁÓWNA LOGIKA FORMULARZA I BAZY ---

        function addTrain(event) {
            event.preventDefault();

            const days = Array.from(document.querySelectorAll('input[name="day"]:checked')).map(cb => parseInt(cb.value));
            
            if (days.length === 0 && includedDates.length === 0) {
                alert("Wybierz dni tygodnia lub dodaj specjalną datę kursowania!");
                return;
            }

            const isEzt = document.querySelector('input[name="consistType"]:checked').value === 'ezt';
            
            if (!isEzt && currentConsist.length === 0) {
                alert("Skład wagonowy nie może być pusty. Dodaj lokomotywę i wagony!");
                return;
            }

            const consistData = isEzt 
                ? { type: 'ezt', model: document.getElementById('eztSelect').value }
                : { type: 'wagonowy', elements: [...currentConsist] }; // Zapis całej tablicy obiektów

            const newTrain = {
                id: crypto.randomUUID(),
                number: document.getElementById('trainNumber').value,
                type: document.getElementById('trainType').value,
                time: document.getElementById('trainTime').value,
                route: document.getElementById('trainRoute').value,
                consist: consistData,
                schedule: {
                    days: days,
                    datesIncluded: [...includedDates],
                    datesExcluded: [...excludedDates]
                }
            };

            trainDatabase.push(newTrain);
            sortDatabase();
            renderTable();
            
            // Resetowanie formularza
            event.target.reset();
            includedDates = [];
            excludedDates = [];
            currentConsist = [];
            renderDateTags('inc');
            renderDateTags('exc');
            updateVisualizer();
        }

        function deleteTrain(id) {
            if(confirm("Usunąć ten skład z bazy?")) {
                trainDatabase = trainDatabase.filter(t => t.id !== id);
                renderTable();
            }
        }

        function sortDatabase() {
            trainDatabase.sort((a, b) => {
                if (a.type !== b.type) return a.type.localeCompare(b.type);
                return a.time.localeCompare(b.time);
            });
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            document.getElementById('countDisplay').innerText = trainDatabase.length;

            const dayNames = {1: 'Pn', 2: 'Wt', 3: 'Śr', 4: 'Czw', 5: 'Pt', 6: 'Sob', 0: 'Nd'};

            trainDatabase.forEach(train => {
                const badgeClass = train.type === 'przyjazd' ? 'bg-arr' : 'bg-dep';
                const typeLabel = `<span class="type-badge ${badgeClass}">${train.type.toUpperCase()}</span>`;
                
                // Generowanie opisu zestawienia
                let consistDesc = '';
                if(train.consist.type === 'ezt') {
                    consistDesc = `<strong>${train.consist.model}</strong>`;
                } else {
                    // Kompatybilność z v1.1
                    if (train.consist.loco) {
                        consistDesc = `<strong>${train.consist.loco}</strong> + [${train.consist.wagons.join(', ')}]`;
                    } else {
                        // Logika v1.2
                        const elementsText = train.consist.elements.map(e => e.type === 'loco' ? `<strong>${e.id}</strong>` : e.id);
                        consistDesc = `[ ${elementsText.join(' - ')} ]`;
                    }
                }

                const daysStr = train.schedule.days.length === 7 ? 'Codz.' : train.schedule.days.map(d => dayNames[d]).join(', ');
                const exceptions = [];
                if (train.schedule.datesIncluded.length > 0) exceptions.push(`+${train.schedule.datesIncluded.length} dat`);
                if (train.schedule.datesExcluded.length > 0) exceptions.push(`-${train.schedule.datesExcluded.length} wył.`);

                tbody.innerHTML += `
                    <tr>
                        <td>${typeLabel}</td>
                        <td><strong>${train.time}</strong></td>
                        <td>
                            <strong>${train.number}</strong><br>
                            <small style="color:#666">${train.route}</small>
                        </td>
                        <td>${consistDesc}</td>
                        <td style="font-size: 0.85rem;">
                            ${daysStr} <br>
                            <span style="color:red; font-size:0.75rem">${exceptions.join(' | ')}</span>
                        </td>
                        <td>
                            <button class="btn btn-danger" onclick="deleteTrain('${train.id}')" aria-label="Usuń skład ${train.number}">Usuń</button>
                        </td>
                    </tr>
                `;
            });
        }

        function downloadDatabase() {
            if (trainDatabase.length === 0) {
                alert("Baza jest pusta!"); return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(trainDatabase, null, 2));
            const dlNode = document.createElement('a');
            dlNode.setAttribute("href", dataStr);
            dlNode.setAttribute("download", "baza_taboru.json");
            document.body.appendChild(dlNode);
            dlNode.click();
            dlNode.remove();
        }

        function loadDatabase(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    if (Array.isArray(json)) {
                        trainDatabase = json;
                        sortDatabase();
                        renderTable();
                        alert("Baza wczytana pomyślnie!");
                    }
                } catch (error) { alert("Błąd pliku JSON."); }
            };
            reader.readAsText(file);
        }

        // Inicjalizacja podglądu przy starcie
        window.onload = updateVisualizer;
    </script>
</body>
</html>
