<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zarządzania Składami - Stacja Techniczna</title>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
    <style>
        /* Wersja aplikacji: v1.0 
           Autorzy: Gemini & Piotr M 🚂
        */
        :root {
            --primary-color: #003366;
            --accent-color: #e6f2ff;
            --text-color: #333;
            --border-color: #ccc;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            background-color: #f4f4f4;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        header {
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { color: var(--primary-color); font-size: 1.5rem; }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            border: none;
        }

        button:hover { opacity: 0.9; }

        .table-container { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th { background-color: var(--accent-color); color: var(--primary-color); }

        .transition-icon { color: #666; font-size: 0.8rem; }

        footer {
            margin-top: 40px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            text-align: center;
            color: #666;
        }

        /* Responsive & WCAG */
        @media (max-width: 600px) {
            th, td { padding: 8px; font-size: 0.85rem; }
            h1 { font-size: 1.2rem; }
        }

        /* PRINT STYLES */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; width: 100%; max-width: none; }
            .no-print { display: none; }
            button, select { display: none; }
            table { font-size: 10pt; }
            th { background-color: #eee !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <div class="container">
        <header>
            <h1>Wykaz Składów i Przejść</h1>
            <button onclick="window.print()" class="no-print">Drukuj Wykaz</button>
        </header>

        <main>
            <div class="controls no-print">
                <label for="daySelector">Wybierz dzień:</label>
                <select id="daySelector" onchange="renderTable()">
                    <option value="Poniedziałek">Poniedziałek</option>
                    <option value="Wtorek">Wtorek</option>
                    <option value="Środa">Środa</option>
                    <option value="Czwartek">Czwartek</option>
                    <option value="Piątek">Piątek</option>
                    <option value="Sobota">Sobota</option>
                    <option value="Niedziela">Niedziela</option>
                </select>
            </div>

            <div class="table-container">
                <table id="trainTable" aria-label="Tabela przyjazdów i odjazdów składów">
                    <thead>
                        <tr>
                            <th>Przyjazd</th>
                            <th>Nr Składu (In)</th>
                            <th><span aria-hidden="true">➔</span> Przejście</th>
                            <th>Nr Składu (Out)</th>
                            <th>Odjazd</th>
                            <th>Uwagi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </main>

        <footer>
            <p>Współautorzy: Gemini & Piotr M 🚂 | Wersja aplikacji: v1.0</p>
        </footer>
    </div>

    <script>
        /* Wersja logiczna: 1.0
           Dane JSON - struktura przygotowana do rozbudowy
        */
        const scheduleData = {
            "Poniedziałek": [
                { arr: "08:15", idIn: "SKL-101", idOut: "SKL-202", dep: "09:45", note: "Czyszczenie" },
                { arr: "10:30", idIn: "SKL-505", idOut: "SKL-505", dep: "11:20", note: "Obrządzanie" }
            ],
            "Wtorek": [
                { arr: "07:00", idIn: "SKL-303", idOut: "SKL-404", dep: "08:30", note: "Przegląd P1" }
            ],
            "Środa": [], "Czwartek": [], "Piątek": [], "Sobota": [], "Niedziela": []
        };

        function renderTable() {
            const selectedDay = document.getElementById('daySelector').value;
            const tableBody = document.getElementById('tableBody');
            const data = scheduleData[selectedDay] || [];

            tableBody.innerHTML = '';

            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Brak zaplanowanych operacji na ten dzień.</td></tr>';
                return;
            }

            data.forEach(item => {
                const row = `
                    <tr>
                        <td><strong>${item.arr}</strong></td>
                        <td>${item.idIn}</td>
                        <td class="transition-icon">Przejście na ➔</td>
                        <td>${item.idOut}</td>
                        <td><strong>${item.dep}</strong></td>
                        <td>${item.note}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        // Inicjalizacja przy starcie
        window.onload = renderTable;
    </script>
</body>
</html>
